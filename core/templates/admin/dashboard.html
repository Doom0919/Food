{% extends "unfold/layouts/base_simple.html" %}

{% block content %}
<div class="p-6">
    <h1 class="text-2xl font-bold mb-6">Хяналтын самбар</h1>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
            <p class="text-sm text-gray-500 uppercase">Нийт хэрэглэгч</p>
            <p class="text-3xl font-semibold">{{ total_users }}</p>
        </div>

        <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
            <p class="text-sm text-gray-500 uppercase">Өнөөдрийн борлуулалт</p>
            <p class="text-3xl font-semibold text-green-600">${{ daily_sales }}</p>
        </div>

        <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
            <p class="text-sm text-gray-500 uppercase">Шинэ захиалга</p>
            <p class="text-3xl font-semibold text-blue-600">{{ new_orders }}</p>
        </div>
    </div>

    <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
        <h2 class="text-lg font-bold mb-4">Сүүлийн үеийн үйлдлүүд</h2>
        <p class="text-gray-600">Энд өөрийн өгөгдлүүдийг жагсааж болно.</p>
    </div>
</div>
{% endblock %}
